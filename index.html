    let currentIdx = 0, expandedLessons = {1: true, 2: false, 3: false, 4: false, 5: false, 6: false, 7: false, 8: false, 9: false, 10: false, 11: false, 12: false};

    function updateUI() {
        const w = allWords[currentIdx];
        document.getElementById('current-lesson-title').innerText = lessonTitles[w.lesson];
        document.getElementById('char-info').innerText = `${w.char} (${w.p})`;
        document.getElementById('word-value').innerText = w.word;
        
        const lessonWords = allWords.filter(item => item.lesson === w.lesson);
        const doneCount = lessonWords.filter(item => item.done).length;
        const totalCount = lessonWords.length;
        const progress = totalCount > 0 ? (doneCount / totalCount) * 100 : 0;
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('progress-text').innerText = `Progress: ${doneCount} / ${totalCount} characters`;
        
        renderSidebar();
        playDemo();
        initQuiz();
    }

    function renderSidebar() {
        const sb = document.getElementById('sidebar');
        sb.innerHTML = '';
        for (let i = 1; i <= 12; i++) {
            const header = document.createElement('div');
            header.className = 'lesson-header';
            header.innerText = (expandedLessons[i] ? '▼ ' : '▶ ') + lessonTitles[i];
            header.onclick = () => { expandedLessons[i] = !expandedLessons[i]; renderSidebar(); };
            sb.appendChild(header);

            if (expandedLessons[i]) {
                allWords.filter(w => w.lesson === i).forEach((w) => {
                    const div = document.createElement('div');
                    div.className = `nav-item ${w.done ? 'done' : ''} ${allWords[currentIdx] === w ? 'active' : ''}`;
                    div.innerText = w.char + (w.done ? ' ✅' : '');
                    div.onclick = () => { currentIdx = allWords.indexOf(w); updateUI(); };
                    sb.appendChild(div);
                });
            }
        }
    }

    function playDemo() {
        document.getElementById('demo-box').innerHTML = '';
        HanziWriter.create('demo-box', allWords[currentIdx].char, {width: 250, height: 250, padding: 20}).animateCharacter();
    }

    function initQuiz() {
        document.getElementById('quiz-box').innerHTML = '';
        const writer = HanziWriter.create('quiz-box', allWords[currentIdx].char, {
            width: 250, height: 250, padding: 20, showOutline: true,
            onComplete: () => { allWords[currentIdx].done = true; updateUI(); }
        });
        writer.quiz();
    }

    function speakFromInfo() {
        const msg = new SpeechSynthesisUtterance(allWords[currentIdx].char);
        msg.lang = 'zh-CN'; window.speechSynthesis.speak(msg);
    }

    updateUI();
